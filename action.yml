name: 'Prediction Market World State'
description: 'Inject real-time prediction market world state into your CI/CD workflows. Powered by SimpleFunctions.'
branding:
  icon: 'globe'
  color: 'blue'
inputs:
  endpoint:
    description: 'Which endpoint: world, index, delta'
    default: 'world'
  format:
    description: 'Output format: json or markdown'
    default: 'markdown'
  since:
    description: 'For delta endpoint: time window (1h, 6h, 24h)'
    default: '1h'
  threshold:
    description: 'Uncertainty threshold for gate mode (0-100). Fails if exceeded.'
    required: false
outputs:
  world_state:
    description: 'The world state data'
  uncertainty:
    description: 'Current uncertainty (0-100)'
  geopolitical:
    description: 'Current geopolitical risk (0-100)'
  momentum:
    description: 'Current momentum (-1 to +1)'
runs:
  using: 'node20'
  main: 'dist/index.js'
